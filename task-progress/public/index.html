<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>任务进度 — Separation of Powers</title>
  <style>
    :root {
      --bg: #0f0f12;
      --card: #1a1a1f;
      --card-soft: #15151a;
      --text: #e4e4e7;
      --muted: #71717a;
      --accent: #3b82f6;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --border: #2a2a33;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.25rem;
      line-height: 1.5;
      max-width: 78rem;
      margin-left: auto;
      margin-right: auto;
    }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    .sub { font-size: 0.9rem; color: var(--muted); margin-bottom: 1rem; }
    .sub a { color: var(--accent); }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tabs button { background: var(--card); border: 1px solid var(--muted); color: var(--text); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
    .tabs button.active { background: var(--accent); border-color: var(--accent); }
    .panel { display: none; }
    .panel.active { display: block; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(11rem, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; }
    .stat-card .value { font-size: 1.4rem; font-weight: 700; }
    .stat-card .label { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
    .filters {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      padding: 0.9rem 1rem;
      background: var(--card-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .filters label { display: flex; flex-direction: column; gap: 0.35rem; font-size: 0.8rem; color: var(--muted); min-width: 12rem; }
    .filters label.checkbox {
      flex-direction: row;
      align-items: center;
      min-width: auto;
      gap: 0.45rem;
      padding-top: 1.55rem;
    }
    .filters select, .filters input {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.55rem 0.7rem;
      font: inherit;
    }
    .flow-board { display: grid; gap: 1rem; }
    .flow-section { display: grid; gap: 0.85rem; }
    .flow-section + .flow-section { margin-top: 1.2rem; }
    .flow-section-title { font-size: 1rem; font-weight: 700; }
    .flow-section-sub { font-size: 0.82rem; color: var(--muted); margin-top: -0.35rem; }
    .flow-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      padding: 1rem;
    }
    .flow-top {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }
    .flow-top-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .flow-title { font-size: 1rem; font-weight: 600; }
    .flow-sub { font-size: 0.82rem; color: var(--muted); margin-top: 0.2rem; }
    .flow-badges { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0.18rem 0.55rem;
      font-size: 0.74rem;
      background: #252532;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .pill.muted { color: var(--muted); }
    .flow-meta {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }
    .flow-steps {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .flow-arrow {
      color: var(--muted);
      margin-left: 1.1rem;
      padding: 0.15rem 0 0.15rem 0.1rem;
      font-size: 1.1rem;
      line-height: 1;
    }
    .flow-node {
      background: var(--card-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem;
    }
    .flow-node.start {
      border-left: 4px solid var(--green);
    }
    .flow-node.step {
      border-left: 4px solid var(--accent);
    }
    .flow-node-top {
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 0.45rem;
    }
    .flow-node-title {
      font-size: 0.95rem;
      font-weight: 600;
    }
    .flow-node-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.15rem;
      word-break: break-all;
      font-family: ui-monospace, monospace;
    }
    .flow-node-meta {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }
    .session-tools {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }
    .session-tool {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 0.7rem;
    }
    .session-tool.call { border-left: 3px solid var(--accent); }
    .session-tool.result { border-left: 3px solid var(--green); }
    .session-tool .head {
      display: flex;
      gap: 0.55rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 0.2rem;
    }
    .session-tool .time { color: var(--muted); font-size: 0.74rem; }
    .session-tool .tool { font-family: ui-monospace, monospace; color: var(--amber); }
    .session-tool .summary { font-family: ui-monospace, monospace; font-size: 0.8rem; color: var(--muted); word-break: break-all; }
    .session-actions { margin-top: 0.7rem; }
    .text-button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.45rem 0.7rem;
      cursor: pointer;
    }
    .flow-empty-note {
      font-size: 0.82rem;
      color: var(--muted);
      font-style: italic;
      padding-top: 0.15rem;
    }
    .pipeline { display: flex; flex-direction: column; gap: 0.5rem; }
    .phase { background: var(--card); border-radius: 8px; padding: 0.85rem 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; border-left: 4px solid var(--accent); }
    .phase .agent { font-weight: 600; min-width: 5.5rem; }
    .phase .label { color: var(--muted); font-size: 0.9rem; flex: 1; min-width: 0; }
    .phase .at { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }
    .tools { display: flex; flex-direction: column; gap: 0.4rem; }
    .tool-event { background: var(--card); border-radius: 6px; padding: 0.6rem 0.85rem; font-size: 0.85rem; border-left: 3px solid var(--muted); }
    .tool-event.toolCall { border-left-color: var(--accent); }
    .tool-event.toolResult { border-left-color: var(--green); }
    .tool-event .head { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.25rem; }
    .tool-event .time { color: var(--muted); font-size: 0.75rem; white-space: nowrap; }
    .tool-event .agent { font-weight: 600; }
    .tool-event .badge { font-size: 0.7rem; padding: 0.1rem 0.35rem; border-radius: 4px; background: var(--muted); color: var(--bg); }
    .tool-event .tool { font-family: ui-monospace, monospace; color: var(--amber); }
    .tool-event .model { font-size: 0.7rem; color: var(--muted); }
    .tool-event .io { font-family: ui-monospace, monospace; font-size: 0.8rem; color: var(--muted); word-break: break-all; }
    .bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .bar button { background: var(--accent); color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
    .bar .auto { font-size: 0.85rem; color: var(--muted); }
    .bar .last-updated { font-size: 0.85rem; color: var(--muted); }
    .error { color: #ef4444; padding: 0.5rem 0; }
    .empty { color: var(--muted); font-style: italic; padding: 1rem 0; }
    .diagnostic { margin-top: 0.5rem; font-size: 0.8rem; color: var(--muted); }
    .hidden-summary {
      margin-bottom: 1rem;
      padding: 0.8rem 1rem;
      background: var(--card-soft);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.82rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <h1>🦞 任务进度</h1>
  <p class="sub">查看各 agent 的会话与秘书发起的立法→行政→司法流程。聊天与操作请用 <a href="http://localhost:18789/" target="_blank" rel="noopener">OpenClaw 控制台</a>。</p>
  <div class="tabs">
    <button type="button" data-tab="dashboard" class="active">Dashboard</button>
    <button type="button" data-tab="pipeline">流程时间线</button>
    <button type="button" data-tab="tools">全局工具流</button>
  </div>
  <div class="bar">
    <button type="button" id="refresh">刷新</button>
    <span class="auto" id="auto-note">每 15 秒自动刷新</span>
    <span class="last-updated" id="last-updated">尚未加载</span>
  </div>

  <div id="panel-dashboard" class="panel active">
    <div id="stats-grid" class="stats-grid"></div>
    <div class="filters">
      <label>
        Agent
        <select id="agent-filter">
          <option value="all">全部 agent</option>
        </select>
      </label>
      <label>
        搜索 session / label
        <input id="session-search" type="text" placeholder="输入任务名、session key、session id" />
      </label>
      <label>
        显示范围
        <select id="scope-filter">
          <option value="active">活跃任务流</option>
          <option value="all">全部任务流</option>
          <option value="history">历史任务流</option>
        </select>
      </label>
      <label>
        系统
        <select id="system-filter">
          <option value="all">全部系统</option>
          <option value="sop">三权分立系统</option>
          <option value="lobster">龙虾主系统</option>
        </select>
      </label>
      <label class="checkbox">
        <input id="include-orphans" type="checkbox" />
        显示未归档 session
      </label>
    </div>
    <div id="hidden-summary" class="hidden-summary"></div>
    <div id="flow-board" class="flow-board"></div>
  </div>
  <div id="panel-pipeline" class="panel">
    <div id="pipeline-list" class="pipeline"></div>
  </div>
  <div id="panel-tools" class="panel">
    <div id="tools-list" class="tools"></div>
  </div>

  <script>
    const API = '';
    const AGENT_NAMES = { main: '🦞 主', secretary: '📋 秘书', legislature: '🏛️ 立法', executive: '⚙️ 行政', judiciary: '⚖️ 司法' };
    const state = {
      sessions: null,
      pipeline: null,
      tools: null,
      lastLoadedAt: null,
      expandedSessions: new Set(),
      collapsedFlows: new Set(),
      filters: { agent: 'all', query: '', scope: 'active', system: 'all', includeOrphans: false },
    };

    function el(tag, attrs, ...children) {
      const e = document.createElement(tag);
      if (attrs && typeof attrs === 'object') Object.assign(e, attrs);
      children.forEach(c => {
        if (c == null) return;
        e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      });
      return e;
    }
    function formatTs(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      const now = Date.now();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
      return d.toLocaleString('zh-CN');
    }
    function agentLabel(id) { return AGENT_NAMES[id] || id; }
    async function fetchSessions() {
      const r = await fetch(API + '/api/sessions');
      if (!r.ok) throw new Error(r.statusText);
      return r.json();
    }
    async function fetchPipeline() {
      const r = await fetch(API + '/api/pipeline');
      if (!r.ok) throw new Error(r.statusText);
      return r.json();
    }
    async function fetchTools(debug, limit = 500) {
      const r = await fetch(API + '/api/tools?limit=' + limit + (debug ? '&debug=1' : ''));
      if (!r.ok) throw new Error(r.statusText);
      return r.json();
    }
    function formatTime(ts) {
      if (!ts) return '—';
      return new Date(ts).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    function summarizeSessionLabel(session) {
      return session.cleanLabel || session.label || (session.origin && session.origin.label) || session.sessionKey || session.sessionId || '未命名会话';
    }
    function classifySession(session) {
      const key = String(session.sessionKey || '').toLowerCase();
      if (key.includes(':cron:') || key.includes(':run:')) return 'cron';
      if (session.spawnedBy || key.includes(':subagent:')) return 'task';
      if (session.chatType === 'channel' || session.chatType === 'group') return 'channel';
      if (key.endsWith(':main')) return 'main';
      return 'other';
    }
    function normalizeLabel(value) {
      return String(value || '').toLowerCase().replace(/\s+/g, ' ').trim();
    }
    function taskTitleFromLabel(label) {
      const raw = String(label || '').trim();
      if (!raw) return '未命名任务流';
      const withoutFlow = raw.replace(/^\[flow:[^\]]+\]\s*/i, '');
      if (!withoutFlow) return '未命名任务流';
      const normalized = withoutFlow.trim();
      if (!normalized) return '未命名任务流';
      const afterColon = normalized.replace(/^[^:]+:\s*/, '');
      const parts = afterColon.split(' - ');
      return parts.length > 1 ? parts.slice(1).join(' - ') : afterColon;
    }
    function enrichSessions(sessions, tools) {
      const toolsBySession = new Map();
      for (const ev of (tools.events || [])) {
        if (!ev.sessionId) continue;
        if (!toolsBySession.has(ev.sessionId)) toolsBySession.set(ev.sessionId, []);
        toolsBySession.get(ev.sessionId).push(ev);
      }
      return (sessions.sessions || []).map((session) => {
        const events = [...(toolsBySession.get(session.sessionId) || [])].sort((a, b) => (a.at || 0) - (b.at || 0));
        const lastEventAt = events[events.length - 1]?.at || 0;
        return {
          ...session,
          label: summarizeSessionLabel(session),
          flowId: session.flowId || null,
          taskTitle: session.taskTitle || taskTitleFromLabel(summarizeSessionLabel(session)),
          events,
          toolCount: events.length,
          lastEventAt,
          activityAt: Math.max(session.updatedAt || 0, lastEventAt || 0),
        };
      }).sort((a, b) => (b.activityAt || 0) - (a.activityAt || 0));
    }
    function buildFlowGroups(phases) {
      const sorted = [...(phases || [])].sort((a, b) => (a.at || 0) - (b.at || 0));
      const groups = [];
      let current = [];
      for (const phase of sorted) {
        const previous = current[current.length - 1];
        const gapTooLarge = previous && (phase.at - previous.at) > 30 * 60 * 1000;
        if (gapTooLarge) {
          groups.push(current);
          current = [];
        }
        current.push(phase);
      }
      if (current.length) groups.push(current);
      return groups;
    }
    function matchPhaseToSession(phase, sessions, usedSessionIds) {
      const phaseLabel = normalizeLabel(phase.label);
      const sameAgent = sessions.filter((session) => session.agentId === phase.agentId && !usedSessionIds.has(session.sessionId));
      const scored = sameAgent.map((session) => {
        const sessionLabel = normalizeLabel(session.label);
        let score = Math.abs((session.activityAt || 0) - (phase.at || 0));
        if (phaseLabel && sessionLabel && phaseLabel === sessionLabel) score -= 1000000;
        else if (phaseLabel && sessionLabel && (phaseLabel.includes(sessionLabel) || sessionLabel.includes(phaseLabel))) score -= 500000;
        return { session, score };
      }).sort((a, b) => a.score - b.score);
      const match = scored[0]?.session || null;
      if (match) usedSessionIds.add(match.sessionId);
      return match;
    }
    function buildFlows(sessions, pipeline, tools) {
      const enriched = enrichSessions(sessions, tools);
      const usedSessionIds = new Set();
      const flows = [];
      const phases = pipeline.phases || [];
      const phasesWithFlowId = phases.filter((phase) => phase.flowId);
      const phasesWithoutFlowId = phases.filter((phase) => !phase.flowId);

      const phasesByFlowId = new Map();
      for (const phase of phasesWithFlowId) {
        if (!phasesByFlowId.has(phase.flowId)) phasesByFlowId.set(phase.flowId, []);
        phasesByFlowId.get(phase.flowId).push(phase);
      }

      for (const [flowId, group] of phasesByFlowId.entries()) {
        const sortedGroup = [...group].sort((a, b) => (a.at || 0) - (b.at || 0));
        const steps = sortedGroup.map((phase) => {
          const session = enriched.find((candidate) => candidate.flowId === flowId && candidate.agentId === phase.agentId && !usedSessionIds.has(candidate.sessionId))
            || matchPhaseToSession(phase, enriched.filter((candidate) => candidate.flowId === flowId || !candidate.flowId), usedSessionIds);
          if (session) usedSessionIds.add(session.sessionId);
          return {
            type: 'phase',
            phase,
            session,
            title: phase.cleanLabel || phase.label,
            agentId: phase.agentId,
            at: session?.activityAt || phase.at,
            toolCount: session?.toolCount || 0,
          };
        });
        const startedAt = steps[0]?.at || sortedGroup[0]?.at || 0;
        const updatedAt = steps.reduce((max, step) => Math.max(max, step.at || 0), startedAt);
        const title = sortedGroup[0]?.taskTitle || steps[0]?.session?.taskTitle || taskTitleFromLabel(sortedGroup[0]?.cleanLabel || sortedGroup[0]?.label || `任务流 ${flows.length + 1}`);
        flows.push({
          id: flowId,
          flowId,
          title,
          startedAt,
          updatedAt,
          steps,
          toolCount: steps.reduce((sum, step) => sum + (step.session?.toolCount || 0), 0),
        });
      }

      const groupedPhases = buildFlowGroups(pipeline.phases || []);
      groupedPhases.forEach((group, index) => {
        if (group.some((phase) => phase.flowId)) return;
        const steps = group.map((phase) => {
          const session = matchPhaseToSession(phase, enriched, usedSessionIds);
          return {
            type: 'phase',
            phase,
            session,
            title: phase.cleanLabel || phase.label,
            agentId: phase.agentId,
            at: session?.activityAt || phase.at,
            toolCount: session?.toolCount || 0,
          };
        });
        const startedAt = steps[0]?.at || group[0]?.at || 0;
        const updatedAt = steps.reduce((max, step) => Math.max(max, step.at || 0), startedAt);
        const title = group[0]?.taskTitle || taskTitleFromLabel(steps[0]?.title || `任务流 ${index + 1}`);
        flows.push({
          id: 'flow-' + index + '-' + startedAt,
          title,
          startedAt,
          updatedAt,
          steps,
          toolCount: steps.reduce((sum, step) => sum + (step.session?.toolCount || 0), 0),
        });
      });

      const orphanSessions = enriched.filter((session) => !usedSessionIds.has(session.sessionId));
      const orphanByFlowId = new Map();
      for (const session of orphanSessions) {
        if (!session.flowId) continue;
        if (!orphanByFlowId.has(session.flowId)) orphanByFlowId.set(session.flowId, []);
        orphanByFlowId.get(session.flowId).push(session);
      }
      for (const [flowId, items] of orphanByFlowId.entries()) {
        if (flows.some((flow) => flow.flowId === flowId)) continue;
        const sortedItems = [...items].sort((a, b) => (a.activityAt || 0) - (b.activityAt || 0));
        sortedItems.forEach((session) => usedSessionIds.add(session.sessionId));
        flows.push({
          id: flowId,
          flowId,
          title: sortedItems[0]?.taskTitle || taskTitleFromLabel(sortedItems[0]?.label),
          startedAt: sortedItems[0]?.activityAt || 0,
          updatedAt: sortedItems[sortedItems.length - 1]?.activityAt || 0,
          source: 'flowid-orphan',
          steps: sortedItems.map((session) => ({
            type: 'session',
            session,
            title: session.label,
            agentId: session.agentId,
            at: session.activityAt,
            toolCount: session.toolCount,
          })),
          toolCount: sortedItems.reduce((sum, session) => sum + session.toolCount, 0),
        });
      }

      const orphanSessionsWithoutFlowId = enriched.filter((session) => !usedSessionIds.has(session.sessionId));
      const managedOrphans = orphanSessionsWithoutFlowId.filter((session) => {
        const kind = classifySession(session);
        return session.toolCount > 0 && kind !== 'channel' && kind !== 'cron';
      }).map((session) => ({
        id: 'session-flow-' + session.sessionId,
        title: session.taskTitle || taskTitleFromLabel(session.label),
        startedAt: session.activityAt,
        updatedAt: session.activityAt,
        source: 'orphan',
        steps: [{
          type: 'session',
          session,
          title: session.label,
          agentId: session.agentId,
          at: session.activityAt,
          toolCount: session.toolCount,
        }],
        toolCount: session.toolCount,
      }));

      const hiddenSummary = {
        channels: orphanSessionsWithoutFlowId.filter((session) => classifySession(session) === 'channel').length,
        cron: orphanSessionsWithoutFlowId.filter((session) => classifySession(session) === 'cron').length,
        orphanTaskLike: managedOrphans.length,
      };

      return {
        flows: flows.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)),
        orphanFlows: managedOrphans.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)),
        hiddenSummary,
      };
    }
    function classifyFlowSystem(flow) {
      const agentIds = new Set(flow.steps.map((step) => step.agentId).filter(Boolean));
      if ([...agentIds].some((id) => ['secretary', 'legislature', 'executive', 'judiciary'].includes(id))) return 'sop';
      return 'lobster';
    }
    function renderStats(sessions, pipeline, tools) {
      const root = document.getElementById('stats-grid');
      const enriched = enrichSessions(sessions, tools);
      const flowData = buildFlows(sessions, pipeline, tools);
      const flows = flowData.flows;
      const now = Date.now();
      const recentCalls = (tools.events || []).filter((ev) => ev.type === 'toolCall' && (now - (ev.at || 0)) < 15 * 60 * 1000).length;
      const activeSessions = enriched.filter((s) => (now - (s.activityAt || 0)) < 15 * 60 * 1000).length;
      const activeFlows = flows.filter((f) => (now - (f.updatedAt || 0)) < 15 * 60 * 1000).length;
      const sessionWithTools = enriched.filter((s) => s.toolCount > 0).length;
      const agents = new Set(enriched.map((s) => s.agentId).filter(Boolean)).size;
      root.innerHTML = '';
      [
        { value: flows.length, label: '任务流数量' },
        { value: activeFlows, label: '15 分钟内活跃任务流' },
        { value: enriched.length, label: '总 Session 数' },
        { value: agents, label: '参与 Agent 数' },
        { value: activeSessions, label: '15 分钟内活跃 Session' },
        { value: recentCalls, label: '15 分钟内工具调用' },
        { value: sessionWithTools, label: '有工具记录的 Session' },
      ].forEach((item) => {
        root.appendChild(el('div', { className: 'stat-card' },
          el('div', { className: 'value' }, String(item.value)),
          el('div', { className: 'label' }, item.label)
        ));
      });
    }
    function renderSessionFilters(sessions) {
      const select = document.getElementById('agent-filter');
      const agentIds = [...new Set((sessions.sessions || []).map((s) => s.agentId).filter(Boolean))].sort();
      const current = state.filters.agent;
      select.innerHTML = '';
      select.appendChild(el('option', { value: 'all' }, '全部 agent'));
      for (const agentId of agentIds) {
        const option = el('option', { value: agentId }, agentLabel(agentId));
        if (agentId === current) option.selected = true;
        select.appendChild(option);
      }
      if (!agentIds.includes(current)) select.value = 'all';
      document.getElementById('session-search').value = state.filters.query;
      document.getElementById('scope-filter').value = state.filters.scope;
      document.getElementById('system-filter').value = state.filters.system;
      document.getElementById('include-orphans').checked = state.filters.includeOrphans;
    }
    function renderDashboard(sessions, pipeline, tools) {
      const root = document.getElementById('flow-board');
      const hiddenSummaryRoot = document.getElementById('hidden-summary');
      renderStats(sessions, pipeline, tools);
      renderSessionFilters(sessions);
      const flowData = buildFlows(sessions, pipeline, tools);
      let flows = [...flowData.flows];
      if (state.filters.includeOrphans) flows = flows.concat(flowData.orphanFlows);
      const query = state.filters.query.trim().toLowerCase();
      const now = Date.now();
      flows = flows.filter((flow) => {
        const age = now - (flow.updatedAt || 0);
        if (state.filters.scope === 'active') return age < 30 * 60 * 1000;
        if (state.filters.scope === 'history') return age >= 30 * 60 * 1000;
        return true;
      });
      const filtered = flows.filter((flow) => {
        const system = classifyFlowSystem(flow);
        if (state.filters.system !== 'all' && system !== state.filters.system) return false;
        if (state.filters.agent !== 'all' && !flow.steps.some((step) => step.agentId === state.filters.agent)) return false;
        if (!query) return true;
        return [
          flow.title,
          ...flow.steps.flatMap((step) => [
            step.title,
            step.agentId,
            step.session?.sessionKey,
            step.session?.sessionId,
            ...(step.session?.events || []).map((ev) => ev.toolName),
          ]),
        ].filter(Boolean).some((value) => String(value).toLowerCase().includes(query));
      });
      hiddenSummaryRoot.textContent = '默认隐藏了 ' + flowData.hiddenSummary.channels + ' 个渠道 session、' + flowData.hiddenSummary.cron + ' 个 cron/run session，以及 ' + flowData.hiddenSummary.orphanTaskLike + ' 个未归档 session。可通过“显示未归档 session”查看后者。';
      root.innerHTML = '';
      if (!filtered.length) {
        root.appendChild(el('div', { className: 'empty' }, '没有匹配的任务流。'));
        return;
      }
      const grouped = {
        sop: filtered.filter((flow) => classifyFlowSystem(flow) === 'sop'),
        lobster: filtered.filter((flow) => classifyFlowSystem(flow) === 'lobster'),
      };
      const sections = state.filters.system === 'all'
        ? [
            { id: 'sop', title: '三权分立系统', sub: 'Secretary / Legislature / Executive / Judiciary 相关任务流', flows: grouped.sop },
            { id: 'lobster', title: '龙虾主系统', sub: '主龙虾自身会话与未进入三权流程的任务流', flows: grouped.lobster },
          ]
        : [
            {
              id: state.filters.system,
              title: state.filters.system === 'sop' ? '三权分立系统' : '龙虾主系统',
              sub: state.filters.system === 'sop' ? 'Secretary / Legislature / Executive / Judiciary 相关任务流' : '主龙虾自身会话与未进入三权流程的任务流',
              flows: filtered,
            }
          ];
      for (const section of sections) {
        if (!section.flows.length) continue;
        const sectionNode = el('div', { className: 'flow-section' },
          el('div', { className: 'flow-section-title' }, section.title),
          el('div', { className: 'flow-section-sub' }, section.sub)
        );
        for (const flow of section.flows) {
        const collapsed = state.collapsedFlows.has(flow.id);
        const card = el('div', { className: 'flow-card' },
          el('div', { className: 'flow-top' },
            el('div', null,
              el('div', { className: 'flow-title' }, flow.title),
              el('div', { className: 'flow-sub' }, flow.source === 'orphan' ? '未归档 session，未能并入明确任务流' : '用户/秘书发起后，按阶段串联 agent 与工具调用')
            ),
            el('div', { className: 'flow-top-actions' },
              el('div', { className: 'flow-badges' },
                el('span', { className: 'pill' }, '阶段 ' + flow.steps.length),
                el('span', { className: 'pill' }, '工具 ' + flow.toolCount)
              ),
              el('button', {
                type: 'button',
                className: 'text-button',
                onclick: () => {
                  if (state.collapsedFlows.has(flow.id)) state.collapsedFlows.delete(flow.id);
                  else state.collapsedFlows.add(flow.id);
                  renderDashboard(state.sessions, state.pipeline, state.tools);
                }
              }, collapsed ? '展开主 Session' : '收起主 Session')
            )
          ),
          !collapsed ? el('div', null,
            el('div', { className: 'flow-meta' },
              el('span', null, '开始 ', formatTs(flow.startedAt)),
              el('span', null, '最近更新 ', formatTs(flow.updatedAt))
            ),
            el('div', { className: 'flow-steps' },
              el('div', { className: 'flow-node start' },
                el('div', { className: 'flow-node-title' }, '用户 / 秘书 发起任务'),
                el('div', { className: 'flow-node-meta' },
                  el('span', null, '发起时间 ', formatTime(flow.startedAt)),
                  el('span', null, '任务流 ', flow.id)
                )
              ),
              ...flow.steps.flatMap((step, index) => {
                const session = step.session || null;
                const events = session ? (state.expandedSessions.has(session.sessionId) ? session.events : session.events.slice(0, 6)) : [];
                const toolSection = session
                  ? session.events.length
                    ? el('div', { className: 'session-tools' }, ...events.map((ev) => {
                        const summary = ev.input || ev.output || '';
                        return el('div', { className: 'session-tool ' + (ev.type === 'toolCall' ? 'call' : 'result') },
                          el('div', { className: 'head' },
                            el('span', { className: 'time' }, formatTime(ev.at)),
                            el('span', { className: 'pill' }, ev.type === 'toolCall' ? '调用' : '响应'),
                            el('span', { className: 'tool' }, ev.toolName || 'unknown'),
                            ev.model ? el('span', { className: 'pill muted' }, ev.model) : null
                          ),
                          summary ? el('div', { className: 'summary' }, summary.slice(0, 240)) : null
                        );
                      }))
                    : el('div', { className: 'flow-empty-note' }, '该 session 暂无工具记录。')
                  : el('div', { className: 'flow-empty-note' }, '尚未匹配到对应 session。');
                const children = [
                  el('div', { className: 'flow-arrow' }, '↓'),
                  el('div', { className: 'flow-node step' },
                    el('div', { className: 'flow-node-top' },
                      el('div', null,
                        el('div', { className: 'flow-node-title' }, agentLabel(step.agentId), ' · ', step.title || '未命名阶段'),
                        session ? el('div', { className: 'flow-node-sub' }, session.sessionKey) : null
                      ),
                      el('div', { className: 'flow-badges' },
                        el('span', { className: 'pill' }, '工具 ' + (session?.toolCount || 0)),
                        session?.chatType ? el('span', { className: 'pill muted' }, session.chatType) : null
                      )
                    ),
                    el('div', { className: 'flow-node-meta' },
                      el('span', null, '阶段时间 ', formatTs(step.phase?.at || step.at)),
                      session ? el('span', null, 'sessionId ', session.sessionId || '—') : null,
                      session ? el('span', null, '最近活动 ', formatTs(session.activityAt)) : null
                    ),
                    toolSection,
                    session && session.events.length > 6 ? el('div', { className: 'session-actions' },
                      el('button', {
                        type: 'button',
                        className: 'text-button',
                        onclick: () => {
                          if (state.expandedSessions.has(session.sessionId)) state.expandedSessions.delete(session.sessionId);
                          else state.expandedSessions.add(session.sessionId);
                          renderDashboard(state.sessions, state.pipeline, state.tools);
                        }
                      }, state.expandedSessions.has(session.sessionId) ? '收起工具流' : '展开全部工具流')
                    ) : null
                  ),
                ];
                return children;
              })
            )
          ) : el('div', { className: 'flow-meta' },
            el('span', null, '开始 ', formatTs(flow.startedAt)),
            el('span', null, '最近更新 ', formatTs(flow.updatedAt)),
            el('span', null, '当前仅显示主 Session 摘要')
          )
        );
          sectionNode.appendChild(card);
        }
        root.appendChild(sectionNode);
      }
      if ((!tools.events || tools.events.length === 0) && tools.debug) {
        root.appendChild(el('div', { className: 'diagnostic' },
          '诊断: 数据目录 ', tools.debug.dataDir || '',
          '，agents: ', (tools.debug.agents || []).join(', '),
          '，已读文件数: ', String(tools.debug.filesRead || 0),
          '，各 agent 事件数: ', JSON.stringify(tools.debug.eventsPerAgent || {})
        ));
      }
    }
    function renderTools(data) {
      const root = document.getElementById('tools-list');
      root.innerHTML = '';
      if (!data.events || data.events.length === 0) {
        const msg = el('div', { className: 'empty' });
        msg.appendChild(document.createTextNode('暂无工具调用记录。'));
        if (data.debug) {
          msg.appendChild(el('br'));
          msg.appendChild(document.createTextNode('诊断: 数据目录 ' + (data.debug.dataDir || '') + '，agents: ' + (data.debug.agents || []).join(', ') + '，已读文件数: ' + (data.debug.filesRead || 0) + '，各 agent 事件数: ' + JSON.stringify(data.debug.eventsPerAgent || {})));
        } else {
          msg.appendChild(el('br'));
          msg.appendChild(document.createTextNode('请确认 .openclaw-data 已挂载到 task-progress 容器（docker compose 中 OPENCLAW_CONFIG_DIR 与 volume 一致）。'));
        }
        root.appendChild(msg);
        return;
      }
      const sorted = [...data.events].sort((a, b) => (b.at || 0) - (a.at || 0));
      for (const ev of sorted) {
        const isCall = ev.type === 'toolCall';
        const card = el('div', { className: 'tool-event ' + ev.type },
          el('div', { className: 'head' },
            el('span', { className: 'time' }, formatTime(ev.at)),
            el('span', { className: 'agent' }, agentLabel(ev.agentId)),
            el('span', { className: 'badge' }, isCall ? '调用' : '响应'),
            el('span', { className: 'tool' }, ev.toolName),
            ev.model ? el('span', { className: 'model' }, ev.model) : null
          ),
          (ev.input || ev.output) ? el('div', { className: 'io' }, (ev.input || ev.output).slice(0, 300)) : null
        );
        root.appendChild(card);
      }
    }
    function renderPipeline(data) {
      const root = document.getElementById('pipeline-list');
      root.innerHTML = '';
      if (!data.phases || data.phases.length === 0) {
        root.appendChild(el('div', { className: 'empty' }, '暂无流程记录（秘书尚未发起立法/行政/司法 spawn，或转录解析未命中）。'));
        return;
      }
      const sorted = [...data.phases].sort((a, b) => (b.at || 0) - (a.at || 0));
      for (const p of sorted) {
        const row = el('div', { className: 'phase' },
          el('span', { className: 'agent' }, agentLabel(p.agentId)),
          el('span', { className: 'label' }, p.label),
          el('span', { className: 'at' }, formatTs(p.at))
        );
        root.appendChild(row);
      }
    }
    document.querySelectorAll('.tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
      });
    });
    document.getElementById('agent-filter').addEventListener('change', (e) => {
      state.filters.agent = e.target.value;
      if (state.sessions && state.pipeline && state.tools) renderDashboard(state.sessions, state.pipeline, state.tools);
    });
    document.getElementById('session-search').addEventListener('input', (e) => {
      state.filters.query = e.target.value;
      if (state.sessions && state.pipeline && state.tools) renderDashboard(state.sessions, state.pipeline, state.tools);
    });
    document.getElementById('scope-filter').addEventListener('change', (e) => {
      state.filters.scope = e.target.value;
      if (state.sessions && state.pipeline && state.tools) renderDashboard(state.sessions, state.pipeline, state.tools);
    });
    document.getElementById('system-filter').addEventListener('change', (e) => {
      state.filters.system = e.target.value;
      if (state.sessions && state.pipeline && state.tools) renderDashboard(state.sessions, state.pipeline, state.tools);
    });
    document.getElementById('include-orphans').addEventListener('change', (e) => {
      state.filters.includeOrphans = e.target.checked;
      if (state.sessions && state.pipeline && state.tools) renderDashboard(state.sessions, state.pipeline, state.tools);
    });
    document.getElementById('refresh').addEventListener('click', load);
    async function load() {
      const sessionRoot = document.getElementById('flow-board');
      const pipelineRoot = document.getElementById('pipeline-list');
      const toolsRoot = document.getElementById('tools-list');
      try {
        const [sessions, pipeline, tools] = await Promise.all([fetchSessions(), fetchPipeline(), fetchTools(true, 500)]);
        state.sessions = sessions;
        state.pipeline = pipeline;
        state.tools = tools;
        state.lastLoadedAt = Date.now();
        document.getElementById('last-updated').textContent = '最近刷新 ' + formatTime(state.lastLoadedAt);
        renderDashboard(sessions, pipeline, tools);
        renderPipeline(pipeline);
        renderTools(tools);
      } catch (e) {
        sessionRoot.innerHTML = '';
        sessionRoot.appendChild(el('div', { className: 'error' }, '请求失败: ' + e.message + '。请确认 task-progress 服务已启动（docker compose up -d task-progress）且端口 3080 可访问。'));
        pipelineRoot.innerHTML = '';
        toolsRoot.innerHTML = '';
      }
    }
    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
